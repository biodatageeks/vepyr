[package]
name = "vepyr"
version = "0.1.0"
edition = "2021"

[lib]
name = "_core"
# "cdylib" is necessary to produce a shared library for Python to import from.
crate-type = ["cdylib"]

[dependencies]
# PyO3 for Python bindings
pyo3 = { version = "0.25", features = ["extension-module", "abi3-py310"] }

# Arrow interop between Rust and Python (PyArrow)
arrow = { version = "56", features = ["pyarrow"] }

# DataFusion for query execution
datafusion = "50.3"
tokio = { version = "1", features = ["rt-multi-thread"] }
futures = "0.3"
log = "0.4"
serde_json = "1"

# Upstream biodatageeks crates
datafusion-bio-function-vep = { git = "https://github.com/biodatageeks/datafusion-bio-functions.git", rev = "d71e978c3b35fd21830e6a125693856f9083aaa1" }
datafusion-bio-format-ensembl-cache = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "7cbc049902196fa5f484101f40d6e78ace6541ec" }
datafusion-bio-format-vcf = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "7cbc049902196fa5f484101f40d6e78ace6541ec" }
