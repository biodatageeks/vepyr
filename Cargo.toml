[package]
name = "vepyr"
version = "0.1.0"
edition = "2021"

[lib]
name = "_core"
# "cdylib" is necessary to produce a shared library for Python to import from.
crate-type = ["cdylib"]

[dependencies]
# PyO3 for Python bindings
pyo3 = { version = "0.25", features = ["extension-module", "abi3-py310"] }

# Arrow interop between Rust and Python (PyArrow)
arrow = { version = "56", features = ["pyarrow"] }

# DataFusion for query execution
datafusion = "50.3.0"
tokio = { version = "1.50.0", features = ["rt-multi-thread"] }
futures = "0.3"
log = "0.4"
serde_json = "1"

# Upstream biodatageeks crates
datafusion-bio-function-vep = { git = "https://github.com/biodatageeks/datafusion-bio-functions.git", rev = "4dc9175f2a52a20d0bdf6e7df4c5cb14143e88a0" }
datafusion-bio-format-ensembl-cache = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "e92ff6fa169d611d67e280551cd3e1a037254093" }
datafusion-bio-format-vcf = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "e92ff6fa169d611d67e280551cd3e1a037254093" }
